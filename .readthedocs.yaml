version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

# Install doc dependencies directly (not via pip install .[docs]) so that
# the C extension build system (CMake, nanobind) is never triggered.
python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false
