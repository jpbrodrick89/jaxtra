name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.os }} — ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          - os: ubuntu-latest
            arch: x86_64
            cibw_platform: linux
          # ── Linux aarch64 (emulated) ──────────────────────────────────────
          - os: ubuntu-latest
            arch: aarch64
            cibw_platform: linux
          # ── macOS x86_64 ──────────────────────────────────────────────────
          - os: macos-13 # last Intel runner
            arch: x86_64
            cibw_platform: macos
          # ── macOS Apple Silicon ───────────────────────────────────────────
          - os: macos-14 # M1/M2 runner
            arch: arm64
            cibw_platform: macos

    steps:
      - uses: actions/checkout@v4

      # ── QEMU for Linux aarch64 cross-compilation ────────────────────────
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── Build wheels ─────────────────────────────────────────────────────
      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux*"

          # ── Linux: bundle with auditwheel ─────────────────────────────────
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64
          CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_28_aarch64

          # ── macOS: use Accelerate framework (ships with Xcode) ────────────
          CIBW_ENVIRONMENT_MACOS: >
            LDFLAGS="-framework Accelerate"
            CMAKE_PREFIX_PATH="/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/System/Library/Frameworks"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

          CIBW_TEST_REQUIRES: pytest jax jaxlib numpy scipy
          CIBW_TEST_COMMAND: pytest {project}/tests -x -q

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  # ── Build source distribution ───────────────────────────────────────────
  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI on tag push ─────────────────────────────────────────
  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/jaxtra
    permissions:
      id-token: write # for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
